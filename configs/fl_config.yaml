# =============================================================================
# FedRGBD — Federated Learning Configuration
# =============================================================================

fl:
  # Number of FL rounds
  num_rounds: 50

  # Early stopping: stop if val loss doesn't improve for this many rounds
  early_stopping_patience: 10

  # Local training per round
  local_epochs: 5
  batch_size: 8             # Constrained by Jetson 8GB shared RAM

  # Optimizer
  optimizer: adam
  learning_rate: 0.001
  weight_decay: 0.0001

  # Participation (3 nodes: A, B, C)
  min_fit_clients: 3
  min_evaluate_clients: 3
  min_available_clients: 3

  # Server address (Node A acts as server)
  server_address: "192.168.1.4:8080"

  # Network
  connection: "wifi"        # IEEE 802.11ac

strategies:
  fedavg:
    name: FedAvg
    params: {}

  fedprox_001:
    name: FedProx
    params:
      proximal_mu: 0.01

  fedprox_01:
    name: FedProx
    params:
      proximal_mu: 0.1

  fedbn:
    name: FedBN
    params: {}

baselines:
  centralized:
    description: "All data pooled on one node (upper bound)"
    epochs: 50
    batch_size: 8

  local_only:
    description: "Each node trains independently (lower bound)"
    epochs: 50
    batch_size: 8

# Random seeds for reproducibility (3 repeats)
seeds: [42, 123, 456]

# Node configuration
nodes:
  node_a:
    ip: "192.168.1.4"
    camera: "Intel RealSense D435if"
    role: "server + client"
    batch_size: 8           # Reduced because server shares GPU
  node_b:
    ip: "192.168.1.5"
    camera: "Intel RealSense D435i"
    role: "client"
    batch_size: 8
  node_c:
    ip: "192.168.1.3"
    camera: "Stereolabs ZED 2i"
    role: "client"
    batch_size: 8           # Reduced because ZED SDK uses GPU memory
