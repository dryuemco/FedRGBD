# =============================================================================
# FedRGBD — Data Configuration
# =============================================================================

# Public dataset (Phase A) — CONFIRMED
public_dataset:
  name: "FLAME"
  source: "Kaggle (smrutisanchitadas/flame-dataset-fire-classification)"
  path: "data/raw/flame_dataset"
  total_images: 47992
  classes:
    Fire: 30155
    No_Fire: 17837
  image_size: [254, 254]
  format: "JPEG"

# Custom RGB-D dataset (Phase B) — for cross-sensor experiments
custom_dataset:
  path: "data/raw/custom/"

  node_a:
    camera: "d435if"
    serial: "239722070442"
    target_frames: 500
    resolution_rgb: [1920, 1080]
    resolution_depth: [1280, 720]
    fps: 30

  node_b:
    camera: "d435i"
    serial: "405622076256"
    target_frames: 500
    resolution_rgb: [1920, 1080]
    resolution_depth: [1280, 720]
    fps: 30

  node_c:
    camera: "zed2i"
    serial: "32608934"
    target_frames: 500
    resolution_rgb: [2208, 1242]
    resolution_depth: [2208, 1242]
    fps: 30

# Data split ratios
splits:
  train: 0.7
  val: 0.15
  test: 0.15

# Non-IID label skew configuration (3 nodes)
non_iid_label:
  node_a_fire_ratio: 0.80
  node_b_fire_ratio: 0.885
  node_c_fire_ratio: 0.20

# Augmentation (applied during training only)
augmentation:
  random_horizontal_flip: 0.5
  random_rotation: 10       # degrees
  color_jitter:
    brightness: 0.2
    contrast: 0.2
  input_size: 224            # Resize for MobileNetV3
