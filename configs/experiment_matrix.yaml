# =============================================================================
# FedRGBD — Complete Experiment Matrix
# =============================================================================
# Total runs: ~90 (excluding profiling which runs in parallel)
# Hardware: 3× Jetson Orin Nano Super, WiFi, D435if + D435i + ZED 2i
# =============================================================================

experiment_1:
  name: "FL Strategy Comparison"
  description: "Compare 6 strategies × 2 data distributions × 3 seeds"
  total_runs: 36

  strategies:
    - centralized
    - local_only
    - fedavg
    - fedprox_0.01
    - fedprox_0.1
    - fedbn

  data_distributions:
    iid:
      description: "Random equal split across 3 nodes (~16K per node)"
      fire_ratio_per_node: 0.628

    non_iid_label:
      description: "Label skew across 3 nodes"
      node_a_fire_ratio: 0.80
      node_b_fire_ratio: 0.885
      node_c_fire_ratio: 0.20

  modality: "rgb"
  seeds: [42, 123, 456]
  rounds: 3
  local_epochs: 5
  batch_size: 8

experiment_2:
  name: "Modality Ablation"
  description: "5 modality combos × best FL strategy × 3 seeds"
  total_runs: 15

  strategy: "fedprox_0.01"  # Best from Exp 1
  data_distribution: "non_iid_label"

  modalities:
    - name: "rgb"
      channels: 3
    - name: "depth"
      channels: 1
    - name: "ir"
      channels: 1
    - name: "rgb_d"
      channels: 4
    - name: "rgb_d_ir"
      channels: 5

  seeds: [42, 123, 456]

experiment_3:
  name: "Cross-Sensor Generalization"
  description: "Train/test across heterogeneous cameras (3 levels)"
  total_runs: 27  # 9 configs × 3 seeds

  configurations:
    # Level 1: Manufacturing Variance
    - name: "d435if_to_d435i"
      train: "node_a"
      test: "node_b"
      heterogeneity: "manufacturing_variance"

    - name: "d435i_to_d435if"
      train: "node_b"
      test: "node_a"
      heterogeneity: "manufacturing_variance"

    # Level 2: Cross-Technology
    - name: "realsense_a_to_zed"
      train: "node_a"
      test: "node_c"
      heterogeneity: "cross_technology"

    - name: "zed_to_realsense_a"
      train: "node_c"
      test: "node_a"
      heterogeneity: "cross_technology"

    - name: "realsense_b_to_zed"
      train: "node_b"
      test: "node_c"
      heterogeneity: "cross_technology"

    - name: "zed_to_realsense_b"
      train: "node_c"
      test: "node_b"
      heterogeneity: "cross_technology"

    # Level 3: FL Generalization
    - name: "fl_all_to_node_a"
      train: "fl_all"
      test: "node_a"
      heterogeneity: "fl_generalization"

    - name: "fl_all_to_node_b"
      train: "fl_all"
      test: "node_b"
      heterogeneity: "fl_generalization"

    - name: "fl_all_to_node_c"
      train: "fl_all"
      test: "node_c"
      heterogeneity: "fl_generalization"

  modality: "rgb_d"
  seeds: [42, 123, 456]

experiment_4:
  name: "Resource Profiling"
  description: "Per-round energy, latency, communication metrics"
  total_runs: 0  # Runs alongside Experiment 1

  metrics:
    - gpu_power_w
    - board_power_w
    - training_time_s
    - model_transfer_size_kb
    - transfer_latency_ms
    - total_energy_wh
    - total_communication_mb
    - peak_gpu_memory_mb

  profiling_tool: "tegrastats"
  sampling_interval_ms: 100

experiment_5:
  name: "Network Constraint Sensitivity"
  description: "Best FL strategy under bandwidth limitations"
  total_runs: 12  # 4 conditions × 3 seeds

  strategy: "fedprox_0.01"  # Best from Exp 1

  network_conditions:
    - name: "wifi_baseline"
      bandwidth: "unrestricted"
      packet_loss: 0.0

    - name: "10mbps"
      bandwidth: "10mbps"
      packet_loss: 0.0
      tc_command: "sudo tc qdisc add dev {iface} root tbf rate 10mbit burst 32kbit latency 400ms"

    - name: "1mbps"
      bandwidth: "1mbps"
      packet_loss: 0.0
      tc_command: "sudo tc qdisc add dev {iface} root tbf rate 1mbit burst 32kbit latency 400ms"

    - name: "1mbps_lossy"
      bandwidth: "1mbps"
      packet_loss: 0.05
      tc_command: "sudo tc qdisc add dev {iface} root handle 1: netem loss 5% && sudo tc qdisc add dev {iface} parent 1:1 handle 10: tbf rate 1mbit burst 32kbit latency 400ms"

  seeds: [42, 123, 456]
